<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Hunters Day Hospice and Club Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f2f2;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

header {
  background: #0e2341;
  color: white;
  padding: 8px 10px 6px 10px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1.1;
}

header p {
  margin: 3px 0 0 0;
  font-size: 11px;
}

#mapWrap {
  position: relative;
  flex: 1;
  min-height: 0;
}

#map {
  width: 100%;
  height: 100%;
}

.watermark {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(255,255,255,0.9);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  z-index: 500;
}

.legend {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.95);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 500;
  line-height: 1.5;
}

.legend div {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
}

.legend-h { background: #d94b7d; }
.legend-c { background: #2b6de0; }

.status {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.95);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 500;
  line-height: 1.4;
  max-width: 240px;
}

.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large {
  background: transparent !important;
}

.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div {
  background: transparent !important;
  border: none !important;
  width: auto !important;
  height: auto !important;
  margin: 0 !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  color: inherit !important;
  font: inherit !important;
}

.custom-cluster-wrap {
  position: relative;
  width: 24px;
  height: 34px;
}

.popup-link {
  display: inline-block;
  margin-top: 2px;
}
</style>
</head>

<body>

<header>
  <h1>Hunters Day Hospice and Club Map</h1>
  <p>Paddlesport clubs and their nearest hospice connections</p>
</header>

<div id="mapWrap">
  <div id="map"></div>

  <div class="status" id="statusBox">Loading map data...</div>

  <div class="legend">
    <div><span class="legend-dot legend-h"></span> Hospice</div>
    <div><span class="legend-dot legend-c"></span> Club</div>
  </div>

  <div class="watermark">Hunters Day • Supporting Hospice Care</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const SHEET_ID = "1YT3u60gFzQWK7MrSSQf5k6Dd6vvjGc-r";
const HOSPICE_SHEET = "Hospices";
const CLUB_SHEET = "Clubs";

const UK_VIEW_BOUNDS = [[49.8, -8.7], [60.9, 2.1]];

const HOSPICE_COLOUR = "#d94b7d";
const CLUB_COLOUR = "#2b6de0";
const LINE_COLOUR = "#f6a800";

const map = L.map("map", {
  zoomControl: true,
  minZoom: 5,
  maxZoom: 18
});

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {
    attribution: "© OpenStreetMap contributors © CARTO",
    subdomains: "abcd",
    maxZoom: 20
  }
).addTo(map);

map.fitBounds(UK_VIEW_BOUNDS, { padding: [10, 10] });

let activeLines = [];
let hospiceData = [];
let clubData = [];

const statusBox = document.getElementById("statusBox");

function setStatus(text) {
  statusBox.textContent = text;
}

function hideStatus() {
  statusBox.style.display = "none";
}

function showStatus() {
  statusBox.style.display = "block";
}

function makePinSvg(label, fill) {
  return `
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="34" viewBox="0 0 28 42">
    <path d="M14 40 C14 40 20.5 27 22.5 21.5 C23.8 18.2 24.2 15.1 24.2 12.5 C24.2 5.9 19.9 2 14 2 C8.1 2 3.8 5.9 3.8 12.5 C3.8 15.1 4.2 18.2 5.5 21.5 C7.5 27 14 40 14 40 Z"
      fill="${fill}" stroke="${fill}" stroke-width="1.5"/>
    <ellipse cx="14" cy="11.5" rx="8.4" ry="8.4" fill="${fill}"/>
    <text x="14" y="15.4" text-anchor="middle"
      font-family="Arial" font-size="9"
      font-weight="bold" fill="white">${label}</text>
  </svg>`;
}

const hospiceIcon = L.icon({
  iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(makePinSvg("H", HOSPICE_COLOUR)),
  iconSize: [22, 34],
  iconAnchor: [11, 34],
  popupAnchor: [0, -28]
});

const clubIcon = L.icon({
  iconUrl: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(makePinSvg("C", CLUB_COLOUR)),
  iconSize: [22, 34],
  iconAnchor: [11, 34],
  popupAnchor: [0, -28]
});

function createClusterIcon(count, color) {
  const clusterSvg = makePinSvg(String(count), color);
  return L.divIcon({
    html: `<div class="custom-cluster-wrap">
      <img src="data:image/svg+xml;charset=UTF-8,${encodeURIComponent(clusterSvg)}" width="22" height="34">
    </div>`,
    className: "",
    iconSize: [22, 34],
    iconAnchor: [11, 34]
  });
}

const hospiceMarkers = L.markerClusterGroup({
  showCoverageOnHover: false,
  maxClusterRadius: 40,
  iconCreateFunction: cluster => createClusterIcon(cluster.getChildCount(), HOSPICE_COLOUR)
});

const clubMarkers = L.markerClusterGroup({
  showCoverageOnHover: false,
  maxClusterRadius: 40,
  iconCreateFunction: cluster => createClusterIcon(cluster.getChildCount(), CLUB_COLOUR)
});

map.addLayer(hospiceMarkers);
map.addLayer(clubMarkers);

function clearLines() {
  activeLines.forEach(line => map.removeLayer(line));
  activeLines = [];
}

function drawLine(lat1, lon1, lat2, lon2) {
  const line = L.polyline(
    [[lat1, lon1], [lat2, lon2]],
    {
      color: LINE_COLOUR,
      weight: 2,
      opacity: 0.8
    }
  ).addTo(map);

  activeLines.push(line);
}

function getSheetJsonUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=out:json`;
}

async function loadSheet(sheetName) {
  const res = await fetch(getSheetJsonUrl(sheetName), { cache: "no-store" });

  if (!res.ok) {
    throw new Error(`Failed to fetch sheet: ${sheetName}`);
  }

  const text = await res.text();
  const match = text.match(/setResponse\(([\s\S]+)\);/);

  if (!match) {
    throw new Error(`Could not parse sheet response: ${sheetName}`);
  }

  return JSON.parse(match[1]);
}

function rowsToObjects(json) {
  const cols = json.table.cols.map(c => c.label);

  return (json.table.rows || []).map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      obj[col] = row.c[i] ? row.c[i].v : "";
    });
    return obj;
  });
}

function normaliseNumber(value) {
  if (value === null || value === undefined || value === "") return null;
  if (typeof value === "string" && value.toUpperCase() === "FAILED") return null;

  const num = Number(value);
  return Number.isFinite(num) ? num : null;
}

function normaliseWebsite(value) {
  if (!value) return "";
  const text = String(value).trim();
  if (!text) return "";
  if (/^https?:\/\//i.test(text)) return text;
  return "https://" + text;
}

function toRad(x) {
  return x * Math.PI / 180;
}

function distanceMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function findTwoNearestHospices(club) {
  const distances = hospiceData.map(hospice => ({
    hospice: hospice,
    distance: distanceMiles(club.lat, club.lon, hospice.lat, hospice.lon)
  }));

  distances.sort((a, b) => a.distance - b.distance);
  return distances.slice(0, 2);
}

async function loadMapData() {
  clearLines();
  hospiceMarkers.clearLayers();
  clubMarkers.clearLayers();
  showStatus();

  setStatus("Loading hospices...");
  const hospiceJson = await loadSheet(HOSPICE_SHEET);

  setStatus("Loading clubs...");
  const clubJson = await loadSheet(CLUB_SHEET);

  hospiceData = rowsToObjects(hospiceJson)
    .map(r => ({
      name: r["Hospice Name"],
      website: normaliseWebsite(r["Website"]),
      lat: normaliseNumber(r["Latitude"]),
      lon: normaliseNumber(r["Longitude"])
    }))
    .filter(r => r.name && r.lat !== null && r.lon !== null);

  clubData = rowsToObjects(clubJson)
    .map(r => ({
      name: r["Club Name"],
      postcode: r["Postcode"],
      lat: normaliseNumber(r["Latitude"]),
      lon: normaliseNumber(r["Longitude"])
    }))
    .filter(r => r.name && r.lat !== null && r.lon !== null);

  hospiceData.forEach(hospice => {
    const marker = L.marker([hospice.lat, hospice.lon], { icon: hospiceIcon });

    let hospicePopup = `<b>${hospice.name}</b>`;
    if (hospice.website) {
      hospicePopup += `<br><a class="popup-link" href="${hospice.website}" target="_blank" rel="noopener noreferrer">Visit website</a>`;
    }

    marker.bindPopup(hospicePopup);

    marker.on("click", () => {
      clearLines();
      marker.openPopup();
    });

    hospiceMarkers.addLayer(marker);
  });

  clubData.forEach(club => {
    const nearestHospices = findTwoNearestHospices(club);
    if (nearestHospices.length === 0) return;

    const first = nearestHospices[0] || null;
    const second = nearestHospices[1] || null;

    const marker = L.marker([club.lat, club.lon], { icon: clubIcon });

    let popupHtml = `<b>${club.name}</b>`;

    if (first) {
      popupHtml += `<br><br>Nearest hospice: ${first.hospice.name}`;

      if (first.hospice.website) {
        popupHtml += `<br><a class="popup-link" href="${first.hospice.website}" target="_blank" rel="noopener noreferrer">Visit website</a>`;
      }

      popupHtml += `<br>Distance: ${first.distance.toFixed(1)} miles`;
    }

    if (second) {
      popupHtml += `<br><br>Second nearest hospice: ${second.hospice.name}`;

      if (second.hospice.website) {
        popupHtml += `<br><a class="popup-link" href="${second.hospice.website}" target="_blank" rel="noopener noreferrer">Visit website</a>`;
      }

      popupHtml += `<br>Distance: ${second.distance.toFixed(1)} miles`;
    }

    marker.bindPopup(popupHtml);

    marker.on("click", () => {
      clearLines();

      if (first) {
        drawLine(club.lat, club.lon, first.hospice.lat, first.hospice.lon);
      }

      if (second) {
        drawLine(club.lat, club.lon, second.hospice.lat, second.hospice.lon);
      }
    });

    clubMarkers.addLayer(marker);
  });

  setStatus(`Loaded ${hospiceData.length} hospices and ${clubData.length} clubs`);
  setTimeout(hideStatus, 2000);
}

loadMapData().catch(err => {
  console.error(err);
  setStatus("Could not load map data");
  alert("Could not load map data from Google Sheets. Check sheet sharing and tab names.");
});
</script>

</body>
</html>
