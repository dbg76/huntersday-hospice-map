<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Hunters Day Hospice and Club Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, Helvetica, sans-serif;
  background: #f2f2f2;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

header {
  background: #0e2341;
  color: white;
  padding: 8px 10px 6px 10px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 18px;
  line-height: 1.1;
}

header p {
  margin: 3px 0 0 0;
  font-size: 11px;
}

#mapWrap {
  position: relative;
  flex: 1;
  min-height: 0;
}

#map {
  width: 100%;
  height: 100%;
}

.watermark {
  position: absolute;
  bottom: 10px;
  left: 10px;
  background: rgba(255,255,255,0.9);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  z-index: 500;
}

.legend {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255,255,255,0.95);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 500;
  line-height: 1.5;
}

.legend div {
  display: flex;
  align-items: center;
  gap: 6px;
}

.legend-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
}

.legend-h { background: #d94b7d; }
.legend-c { background: #2b6de0; }

.status {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.95);
  padding: 8px 10px;
  border-radius: 8px;
  font-size: 12px;
  z-index: 500;
  line-height: 1.4;
  max-width: 240px;
}

.marker-cluster-small,
.marker-cluster-medium,
.marker-cluster-large {
  background: transparent !important;
}

.marker-cluster-small div,
.marker-cluster-medium div,
.marker-cluster-large div {
  background: transparent !important;
  border: none !important;
  width: auto !important;
  height: auto !important;
  margin: 0 !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  color: inherit !important;
  font: inherit !important;
}

.custom-cluster-wrap {
  position: relative;
  width: 24px;
  height: 34px;
}

.popup-link {
  display: inline-block;
  margin-top: 2px;
}

.popup-section-title {
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <h1>Hunters Day Hospice and Club Map</h1>
  <p>Paddlesport clubs and their nearest hospice connections</p>
</header>

<div id="mapWrap">
  <div id="map"></div>

  <div class="status" id="statusBox">Loading map data...</div>

  <div class="legend">
    <div><span class="legend-dot legend-h"></span> Hospice</div>
    <div><span class="legend-dot legend-c"></span> Club</div>
  </div>

  <div class="watermark">Hunters Day • Supporting Hospice Care</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const SHEET_ID = "1YT3u60gFzQWK7MrSSQf5k6Dd6vvjGc-r";
const HOSPICE_SHEET = "Hospices";
const CLUB_SHEET = "Clubs";

const UK_VIEW_BOUNDS = [[49.8, -8.7], [60.9, 2.1]];

const HOSPICE_COLOUR = "#d94b7d";
const CLUB_COLOUR = "#2b6de0";
const LINE_COLOUR = "#f6a800";

const map = L.map("map", {
  zoomControl: true,
  minZoom: 5,
  maxZoom: 18
});

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {
    attribution: "© OpenStreetMap contributors © CARTO",
    subdomains: "abcd",
    maxZoom: 20
  }
).addTo(map);

map.fitBounds(UK_VIEW_BOUNDS, { padding: [10, 10] });

let activeLines = [];
let hospiceData = [];
let clubData = [];

const statusBox = document.getElementById("statusBox");

function setStatus(text) {
  statusBox.textContent = text;
}

function hideStatus() {
  statusBox.style.display = "none";
}

function showStatus() {
  statusBox.style.display = "block";
}
